<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control GS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;background:#f0f4f8;color:#222;min-height:100vh}
.hidden{display:none!important}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a3a5c 0%,#2d6a9f 100%)}
.login-card{background:#fff;border-radius:16px;padding:2.5rem 2rem;width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.login-logo{text-align:center;margin-bottom:1.5rem}
.app-title{font-size:22px;font-weight:700;color:#1a3a5c;letter-spacing:1px}
.app-sub{font-size:12px;color:#888;margin-top:2px}
.user-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1.2rem}
.user-btn{padding:10px 4px;border:2px solid #e0e0e0;border-radius:10px;background:#f8f8f8;cursor:pointer;font-size:13px;font-weight:600;color:#444;transition:all .2s;width:100%}
.user-btn:hover{border-color:#2d6a9f;color:#2d6a9f;background:#e8f0fa}
.user-btn.active{border-color:#2d6a9f;background:#2d6a9f;color:#fff}
.user-btn .icon{font-size:22px;display:block;margin-bottom:4px}
.login-input{width:100%;padding:10px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:12px;outline:none}
.login-input:focus{border-color:#2d6a9f}
.login-btn{width:100%;padding:11px;background:#2d6a9f;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
.login-btn:hover{background:#1a3a5c}
.login-error{color:#c0392b;font-size:13px;text-align:center;margin-top:8px;min-height:18px}
#app{display:none;min-height:100vh;background:#f0f4f8}
.topbar{background:#1a3a5c;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-size:16px;font-weight:700;letter-spacing:1px}
.user-info{display:flex;align-items:center;gap:10px;font-size:13px}
.avatar{width:32px;height:32px;border-radius:50%;background:#2d6a9f;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.logout-btn{background:rgba(255,255,255,0.15);border:none;color:#fff;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#27ae60;display:inline-block}
.sync-dot.off{background:#e74c3c}
.nav{background:#fff;border-bottom:1px solid #e0e8f0;display:flex;overflow-x:auto;padding:0 16px;gap:4px;position:sticky;top:52px;z-index:99}
.nav-btn{padding:12px 16px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:#888;white-space:nowrap;border-bottom:3px solid transparent}
.nav-btn:hover{color:#2d6a9f}
.nav-btn.active{color:#2d6a9f;border-bottom-color:#2d6a9f}
.content{padding:20px;max-width:900px;margin:0 auto}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #e0e8f0}
.card-title{font-size:15px;font-weight:700;color:#1a3a5c;margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
label{font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.5px}
input,select,textarea{padding:9px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;outline:none;width:100%;background:#fff;color:#222}
input:focus,select:focus,textarea:focus{border-color:#2d6a9f}
textarea{resize:vertical;min-height:60px}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn-primary{background:#2d6a9f;color:#fff}
.btn-primary:hover{background:#1a3a5c}
.btn-success{background:#27ae60;color:#fff}
.btn-success:hover{background:#1e8449}
.btn-danger{background:#e74c3c;color:#fff;font-size:11px;padding:3px 8px;border:none;border-radius:5px;cursor:pointer}
.btn-secondary{background:#ecf0f1;color:#555;border:none}
.btn-sm{padding:6px 12px;font-size:12px}
.cuotas-tag{display:inline-block;background:#fff3cd;color:#856404;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;border:1px solid #ffc107}
.pago-cuota-tag{display:inline-block;background:#f8d7da;color:#721c24;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;border:1px solid #f5c6cb}
.ingreso-tag{display:inline-block;background:#e8f8f0;color:#1a7a45;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;border:1px solid #a8e6c3}
.ahorro-tag{display:inline-block;background:#e8f4fd;color:#1a5276;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;border:1px solid #a9cce3}
.banner{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;margin-top:4px;border-left:4px solid}
.banner-ingreso{background:#f0faf4;border-color:#27ae60;color:#1a5e32}
.banner-ahorro{background:#f0f7fd;border-color:#2d6a9f;color:#1a3a5c}
.gasto-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid #f0f4f8}
.gasto-item:last-child{border-bottom:none}
.gasto-cat{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:#f0f4f8}
.gasto-info{flex:1;min-width:0}
.gasto-desc{font-weight:600;font-size:14px;color:#222}
.gasto-meta{font-size:12px;color:#888;margin-top:2px}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;margin-right:4px}
.tag-hugo{background:#e8f0fa;color:#2d6a9f}
.tag-loli{background:#fce8f5;color:#a0287a}
.tag-familia{background:#e8f5e9;color:#1b5e20}
.tag-empresa{background:#fff3e0;color:#e65100}
.tag-dolares{background:#e0f7fa;color:#006064}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:#f8fafd;border:1px solid #e0e8f0;border-radius:10px;padding:14px;text-align:center}
.stat-card.s-ingreso{background:#f0faf4;border-color:#a8e6c3}
.stat-card.s-ahorro{background:#f0f7fd;border-color:#a9cce3}
.stat-val{font-size:19px;font-weight:700;color:#1a3a5c}
.stat-lbl{font-size:11px;color:#888;margin-top:4px;font-weight:600}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.chart-box{background:#fff;border:1px solid #e0e8f0;border-radius:12px;padding:16px}
.chart-title{font-size:13px;font-weight:700;color:#1a3a5c;margin-bottom:12px}
.section-sep{height:1px;background:#f0f4f8;margin:14px 0}
.admin-sec-title{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #f0f4f8}
.cat-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.cat-tag{display:flex;align-items:center;gap:6px;background:#f0f4f8;padding:5px 10px;border-radius:8px;font-size:13px}
.add-item-row{display:flex;gap:8px}
.add-item-row input{flex:1}
.pred-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.pred-chip{background:#e8f0fa;color:#2d6a9f;border:1px solid #b3cce8;border-radius:20px;padding:5px 12px;font-size:13px;cursor:pointer;font-weight:600}
.pred-chip:hover{background:#2d6a9f;color:#fff}
.pred-chip.ing{background:#f0faf4;color:#1a7a45;border-color:#a8e6c3}
.pred-chip.ing:hover{background:#27ae60;color:#fff}
.filtros{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filtros select,.month-bar select{width:auto}
.month-bar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.smsg{font-size:12px;font-weight:600}
.smsg.ok{color:#27ae60}
.smsg.err{color:#e74c3c}
@media(max-width:600px){
  .form-grid{grid-template-columns:1fr}
  .charts-grid{grid-template-columns:1fr}
  .content{padding:12px}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="app-title">CONTROL GS</div>
      <div class="app-sub">gestión de gastos personales</div>
    </div>
    <div class="user-btns">
      <button class="user-btn" onclick="selectUser('hugo')" id="btn-hugo"><span class="icon">🚗</span>Hugo</button>
      <button class="user-btn" onclick="selectUser('loli')" id="btn-loli"><span class="icon">👗</span>Loli</button>

<script type="module">

const db = getDatabase(fbApp);
window._fb = {db,ref,push,onValue,remove,set,get};
window._fbReady = true;

<script>
// ── CATEGORÍAS POR DEFECTO ──────────────────────────────────────────────
// tipo: 'gasto' = suma a costos | 'ingreso' = no suma, es entrada de dinero | 'ahorro' = no suma, es ahorro
const DC = {
  hugo:[
    {id:'h_camioneta',label:'Camioneta',      icon:'🚗',tipo:'gasto',  items:['Combustible','Service','Seguro','Patente','Reparación']},
    {id:'h_ropa',     label:'Ropa',           icon:'👕',tipo:'gasto',  items:['Indumentaria','Calzado','Accesorios']},
    {id:'h_gym',      label:'Gym',            icon:'💪',tipo:'gasto',  items:['Cuota mensual','Ropa deportiva','Suplementos']},
    {id:'h_esparc',   label:'Esparcimiento',  icon:'🎯',tipo:'gasto',  items:['Salidas','Entretenimiento','Hobbies']},
    {id:'h_galeno',   label:'Galeno',         icon:'🏥',tipo:'gasto',  items:['Cuota','Consultas','Medicamentos','Estudios']},
    {id:'h_otros',    label:'Pequeños gastos',icon:'☕',tipo:'gasto',  items:['Desayunos','Meriendas','Compras varias','Otros']},
    {id:'h_retiro',   label:'Retiro de caja', icon:'💵',tipo:'ingreso',items:['Retiro efectivo']},
  ],
  loli:[
    {id:'l_ropa',    label:'Ropa',          icon:'👗',tipo:'gasto',  items:['Indumentaria','Calzado','Accesorios','Bijouterie']},
    {id:'l_cursos',  label:'Cursos',        icon:'📚',tipo:'gasto',  items:['Cursos online','Formación','Libros','Material']},
    {id:'l_gym',     label:'Gym',           icon:'💪',tipo:'gasto',  items:['Cuota mensual','Clases','Ropa deportiva']},
    {id:'l_belleza', label:'Belleza',       icon:'💅',tipo:'gasto',  items:['Peluquería','Estética','Cosméticos','Spa']},
    {id:'l_auto',    label:'Auto',          icon:'🚙',tipo:'gasto',  items:['Combustible','Seguro','Patente','Service','Reparación']},
    {id:'l_swiss',   label:'Swiss Medical', icon:'🏥',tipo:'gasto',  items:['Cuota','Consultas','Medicamentos','Estudios']},
    {id:'l_salidas', label:'Salidas',       icon:'🍽️',tipo:'gasto', items:['Restaurantes','Bares','Eventos','Teatro/Cine']},
    {id:'l_otros',   label:'Otros gastos',  icon:'🛍️',tipo:'gasto', items:['Otros']},
    {id:'l_retiro',  label:'Retiro de caja',icon:'💵',tipo:'ingreso',items:['Retiro efectivo']},
  ],
  familia:[
    {id:'f_servicios',label:'Servicios',            icon:'🔌',tipo:'gasto',items:['Luz','Gas','Internet','Teléfono','Agua','Expensas']},
    {id:'f_comida',   label:'Comida',               icon:'🛒',tipo:'gasto',items:['Supermercado','Verdulería','Carnicería','Fiambrería','Delivery']},
    {id:'f_medicam',  label:'Medicamentos',          icon:'💊',tipo:'gasto',items:['Farmacia','Vitaminas','Otros']},
    {id:'f_esparc',   label:'Esparcimiento familiar',icon:'🎪',tipo:'gasto',items:['Vacaciones','Salidas','Actividades','Cumpleaños']},
    {id:'f_max',      label:'Max',                   icon:'👦',tipo:'gasto',items:['Colegio','Cuota','Útiles','Ropa','Mesada','Actividades','Médico']},
    {id:'f_plataform',label:'Plataformas',           icon:'📺',tipo:'gasto',items:['Netflix','Disney+','Amazon Prime','Spotify','YouTube','Apple TV','Otros']},
    {id:'f_reparac',  label:'Reparaciones',          icon:'🔧',tipo:'gasto',items:['Plomería','Electricidad','Albañilería','Pintura','Otros']},
    {id:'f_inversion',label:'Inversión casa',        icon:'🏠',tipo:'gasto',items:['Muebles','Electrodomésticos','Reformas','Equipamiento']},
  ],
  empresa:[
    {id:'e_reparac',  label:'Reparaciones',         icon:'🔨',tipo:'gasto',items:['Plomería','Electricidad','Albañilería','Pintura','Herrería','Otros']},
    {id:'e_inversion',label:'Inversión',            icon:'🏢',tipo:'gasto',items:['Equipamiento','Muebles','Mejoras','Instalaciones']},
    {id:'e_publicid', label:'Publicidad',           icon:'📢',tipo:'gasto',items:['Portal inmobiliario','Redes sociales','Imprenta','Otros']},
    {id:'e_otros',    label:'Otros gastos empresa', icon:'📋',tipo:'gasto',items:['Honorarios','Trámites','Papelería','Otros']},
  ],
  dolares:[
    {id:'d_ahorro',   label:'Ahorro en USD',    icon:'💰',tipo:'ahorro',items:['Compra de dólares']},
    {id:'d_viajes',   label:'Viajes',           icon:'✈️',tipo:'ahorro',items:['Vuelos','Alojamiento','Excursiones','Gastos varios']},
    {id:'d_inversion',label:'Inversión en USD', icon:'📈',tipo:'ahorro',items:['Compra inmueble','Inversión financiera','Otros']},
  ]
};

const DPW = {hugo:'hugo123',loli:'loli123',admin:'admin2024'};

// ── ESTADO ──────────────────────────────────────────────────────────────
let CU=null, tab='cargar', charts={}, gastos=[], cats=JSON.parse(JSON.stringify(DC)), pw={...DPW}, unsubs=[];

// ── FIREBASE ─────────────────────────────────────────────────────────────
function wfb(cb){window._fbReady?cb():window.addEventListener('fbReady',cb,{once:true});}
function fbr(p){return window._fb.ref(window._fb.db,p);}
function fbl(p,cb){const u=window._fb.onValue(fbr(p),s=>cb(s.val()));unsubs.push(u);return u;}
function fbs(p,d){return window._fb.set(fbr(p),d);}
function fbp(p,d){return window._fb.push(fbr(p),d);}
function fbd(p){return window._fb.remove(fbr(p));}
async function fbg(p){return(await window._fb.get(fbr(p))).val();}
function stopAll(){unsubs.forEach(u=>{try{u()}catch(e){}});unsubs=[];}

// ── AUTH ─────────────────────────────────────────────────────────────────
function selectUser(u){
  document.querySelectorAll('.user-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+u).classList.add('active');
  CU=u; document.getElementById('login-pass').focus();
}
async function doLogin(){
  if(!CU){setErr('Seleccioná un usuario');return;}
  const pass=document.getElementById('login-pass').value;
  setErr('');
  wfb(async()=>{
    try{
      const stored=await fbg('controlgs/config/passwords');
      const p=stored||DPW;
      if(pass===p[CU]){
        pw=p;
        document.getElementById('login-screen').style.display='none';
        document.getElementById('app').style.display='block';
        initApp();
      }else{setErr('Contraseña incorrecta');}
    }catch(e){setErr('Error de conexión');}
  });
}
function setErr(m){document.getElementById('login-error').textContent=m;}
function logout(){
  stopAll();gastos=[];CU=null;tab='cargar';
  Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('login-pass').value='';
  setErr('');
  document.querySelectorAll('.user-btn').forEach(b=>b.classList.remove('active'));
}

// ── INIT ─────────────────────────────────────────────────────────────────
function initApp(){
  document.getElementById('top-avatar').textContent={hugo:'HG',loli:'LO',admin:'AD'}[CU];
  document.getElementById('top-username').textContent={hugo:'Hugo',loli:'Loli',admin:'Admin'}[CU];

  // Escuchar categorías — cuando Firebase responde, actualiza `cats` y re-renderiza admin/cargar
  fbl('controlgs/config/categories',val=>{
    cats = val ? mergeCats(val) : JSON.parse(JSON.stringify(DC));
    if(tab==='admin'||tab==='cargar') rc();
  });

  // Escuchar gastos (admin ve todos, hugo/loli solo los suyos)
  const gpath = CU==='admin'?'controlgs/gastos':`controlgs/gastos_${CU}`;
  fbl(gpath,val=>{
    gastos=val?Object.entries(val).map(([k,v])=>({...v,_key:k})):[];
    gastos.sort((a,b)=>b.fecha.localeCompare(a.fecha));
    document.getElementById('sync-dot').className='sync-dot';
    rc();
  });

  const tabs=CU==='admin'
    ?[{id:'dashboard',l:'📊 Dashboard'},{id:'gastos',l:'📋 Todos los gastos'},{id:'reportes',l:'📄 Reportes'},{id:'admin',l:'⚙️ Admin'}]
    :[{id:'cargar',l:'➕ Cargar'},{id:'mis-gastos',l:'📋 Mis gastos'},{id:'reportes',l:'📊 Reportes'}];
  tab=tabs[0].id;
  document.getElementById('main-nav').innerHTML=tabs.map(t=>`<button class="nav-btn${t.id===tab?' active':''}" onclick="sw('${t.id}')">${t.l}</button>`).join('');
  rc();
}

function mergeCats(fb){
  // Combina Firebase con defaults: si Firebase tiene la sección la usa, si no usa default
  const m=JSON.parse(JSON.stringify(DC));
  Object.keys(fb).forEach(s=>{ if(fb[s]&&Array.isArray(fb[s])) m[s]=fb[s]; });
  return m;
}

function sw(t){
  tab=t;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('onclick').includes(`'${t}'`)));
  rc();
}

function rc(){
  Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};
  const el=document.getElementById('main-content');
  if(tab==='cargar')    el.innerHTML=vCargar();
  else if(tab==='mis-gastos') el.innerHTML=vMisGastos();
  else if(tab==='dashboard')  el.innerHTML=vDashboard();
  else if(tab==='gastos')     el.innerHTML=vTodos();
  else if(tab==='reportes')   el.innerHTML=vReportes();
  else if(tab==='admin')      el.innerHTML=vAdmin();
  mkCharts();
}

// ── CARGAR ────────────────────────────────────────────────────────────────
function vCargar(){
  const today=new Date().toISOString().split('T')[0];
  const uc=getCats('personal');
  const ch=chips();
  return`<div class="card">
  <div class="card-title">➕ Nuevo registro</div>
  <div class="pred-chips">
    <span style="font-size:12px;color:#888;margin-right:4px">Rápido:</span>
    ${ch.g.map(c=>`<span class="pred-chip" onclick='chip(${JSON.stringify(c)})'>${c.l}</span>`).join('')}
    ${ch.i.map(c=>`<span class="pred-chip ing" onclick='chip(${JSON.stringify(c)})'>${c.l}</span>`).join('')}
  </div>
  <div class="form-grid">
    <div class="form-group"><label>Fecha</label><input type="date" id="g-fecha" value="${today}"></div>
    <div class="form-group"><label>Moneda</label><select id="g-moneda"><option value="ARS">$ Pesos</option><option value="USD">USD Dólares</option></select></div>
    <div class="form-group"><label>Monto</label><input type="number" id="g-monto" placeholder="0" min="0" step="1"></div>

function chip(c){
  const se=document.getElementById('g-seccion');
  if(!se)return;
  se.value=c.s; updCats();
  setTimeout(()=>{
    const ce=document.getElementById('g-cat');
    if(ce){ce.value=c.c;updItems();}
    setTimeout(()=>{const ie=document.getElementById('g-item');if(ie)ie.value=c.i;},60);
  },60);
  document.getElementById('g-monto').focus();
}

function getCats(sec){
  return({personal:CU==='hugo'?cats.hugo:cats.loli,familia:cats.familia,empresa:cats.empresa,dolares:cats.dolares}[sec]||[]);
}

function updCats(){
  const sec=document.getElementById('g-seccion')?.value;
  if(!sec)return;
  const list=getCats(sec);
  document.getElementById('g-cat').innerHTML=list.map(c=>`<option value="${c.id}" data-tipo="${c.tipo||'gasto'}">${c.icon} ${c.label}${c.tipo==='ingreso'?' — INGRESO':c.tipo==='ahorro'?' — AHORRO':''}</option>`).join('');
  updItems();
}

function updItems(){
  const sec=document.getElementById('g-seccion')?.value;
  const cid=document.getElementById('g-cat')?.value;
  if(!sec||!cid)return;
  const cat=getCats(sec).find(c=>c.id===cid);
  document.getElementById('g-item').innerHTML=(cat?.items||[]).map(i=>`<option>${i}</option>`).join('');
  // Banner
  const tipo=cat?.tipo||'gasto';
  const b=document.getElementById('tipo-banner');
  if(b){
    if(tipo==='ingreso') b.innerHTML=`<div class="banner banner-ingreso">💵 INGRESO — este retiro no suma a tus costos</div>`;
    else if(tipo==='ahorro') b.innerHTML=`<div class="banner banner-ahorro">💰 AHORRO en USD — no suma a costos</div>`;
    else b.innerHTML='';
  }
}

function tgCuotas(){
  const show=document.getElementById('g-pago')?.value==='tj_credito';
  document.getElementById('cg').classList.toggle('hidden',!show);
  document.getElementById('tcg').classList.toggle('hidden',!show);
}

async function guardar(){
  const fecha=document.getElementById('g-fecha').value;
  const monto=parseFloat(document.getElementById('g-monto').value);
  const moneda=document.getElementById('g-moneda').value;
  const pago=document.getElementById('g-pago').value;
  const sec=document.getElementById('g-seccion').value;
  const cid=document.getElementById('g-cat').value;
  const item=document.getElementById('g-item').value;
  const desc=document.getElementById('g-desc').value.trim();
  const cuotas=parseInt(document.getElementById('g-cuotas')?.value||1);
  const tc=document.getElementById('g-tc')?.value||'compra';
  const msg=document.getElementById('g-msg');

  if(!fecha||!monto||monto<=0){msg.className='smsg err';msg.textContent='⚠️ Completá fecha y monto';return;}

  const cat=getCats(sec).find(c=>c.id===cid);
  const tipo=cat?.tipo||'gasto';

  const reg={
    fecha,monto,moneda,pago,seccion:sec,
    catId:cid,catLabel:cat?.label||cid,catIcon:cat?.icon||'📌',
    tipo, item,desc,usuario:CU,
    esCuotas:pago==='tj_credito'&&cuotas>1,
    cuotas:pago==='tj_credito'?cuotas:1,
    esPagoCuota:pago==='tj_credito'&&tc==='pago',
    createdAt:new Date().toISOString()
  };

  msg.className='smsg ok';msg.textContent='Guardando...';
  try{
    await fbp(`controlgs/gastos_${CU}`,reg);
    await fbp('controlgs/gastos',reg);
    msg.textContent='✅ Guardado';
    document.getElementById('g-monto').value='';
    document.getElementById('g-desc').value='';
    setTimeout(()=>{msg.textContent='';},2500);
  }catch(e){msg.className='smsg err';msg.textContent='❌ Error al guardar';}
}

function limpiar(){
  document.getElementById('g-monto').value='';
  document.getElementById('g-desc').value='';
  document.getElementById('g-seccion').value='personal';
  updCats();
}

function expPDF(){
  const{jsPDF}=window.jspdf;
  const mes=document.getElementById('rep-mes').value;
  const gm=gastos.filter(x=>x.fecha.substr(0,7)===mes);
  const doc=new jsPDF();
  doc.setFontSize(20);doc.setTextColor(26,58,92);doc.text('CONTROL DE GASTOS',20,22);
  doc.setFontSize(12);doc.setTextColor(100);doc.text(`Reporte: ${fmes(mes)}`,20,32);
  if(CU!=='admin')doc.text(`Usuario: ${CU.charAt(0).toUpperCase()+CU.slice(1)}`,20,40);
  const tG=gm.filter(g=>esReal(g)&&g.moneda==='ARS').reduce((s,g)=>s+g.monto,0);
  const tI=gm.filter(g=>(g.tipo||'gasto')==='ingreso'&&g.moneda==='ARS').reduce((s,g)=>s+g.monto,0);
  const tU=gm.filter(g=>(g.tipo||'gasto')==='ahorro'&&g.moneda==='USD').reduce((s,g)=>s+g.monto,0);
  let y=50;
  doc.setFontSize(12);doc.setTextColor(26,58,92);doc.text(`Total gastos ARS: $${fmt(tG)}`,20,y);y+=8;
  if(tI>0){doc.setTextColor(26,122,69);doc.text(`Retiros: $${fmt(tI)}`,20,y);y+=8;}
  if(tU>0){doc.setTextColor(26,58,92);doc.text(`Ahorro USD: ${fmt(tU)}`,20,y);y+=8;}
  y+=4;doc.setFontSize(9);doc.setTextColor(80);
  doc.text('Fecha',15,y);doc.text('Usuario',40,y);doc.text('Tipo',60,y);doc.text('Categoría',78,y);doc.text('Ítem',128,y);doc.text('Monto',168,y);
  doc.setDrawColor(200);doc.line(15,y+2,195,y+2);y+=7;
  doc.setTextColor(0);
  gm.sort((a,b)=>a.fecha.localeCompare(b.fecha)).forEach(x=>{
    if(y>270){doc.addPage();y=20;}
    const tp=x.tipo||'gasto';
    doc.text(x.fecha.split('-').reverse().join('/'),15,y);
    doc.text((x.usuario||'').substr(0,5),40,y);
    doc.text(tp==='ingreso'?'INGR':tp==='ahorro'?'USD':x.esPagoCuota?'cuota':'gasto',60,y);
    doc.text((x.catLabel||'').substr(0,22),78,y);
    doc.text((x.item||'').substr(0,17),128,y);
    doc.text(x.moneda==='USD'?`USD${x.monto.toFixed(0)}`:`$${fmt(x.monto)}`,168,y);
    y+=5.5;
  });
  doc.save(`control-gastos-${mes}.pdf`);
}

    <div style="font-size:14px;font-weight:700;color:#1a3a5c;padding:8px 12px;background:#f8fafd;border-radius:8px;border-left:4px solid #2d6a9f;margin-bottom:12px">${sn[sec]}</div>
    ${(cats[sec]||[]).map(cat=>`
    <div style="margin-bottom:14px;padding-left:12px;border-left:3px solid ${tcc[cat.tipo||'gasto']}40">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <span style="font-size:18px">${cat.icon}</span>
        <strong style="font-size:13px">${cat.label}</strong>
        <span style="font-size:11px;padding:2px 8px;border-radius:8px;background:${tcc[cat.tipo||'gasto']}15;color:${tcc[cat.tipo||'gasto']};font-weight:700">${tc[cat.tipo||'gasto']}</span>
      </div>
      <div class="cat-list">
        ${(cat.items||[]).map(item=>`<div class="cat-tag">${item}<button class="btn-danger" onclick="qItem('${sec}','${cat.id}','${item.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">×</button></div>`).join('')}
      </div>
      <div class="add-item-row" style="margin-top:8px">
        <input type="text" id="ni-${cat.id}" placeholder="Nuevo ítem...">
        <button class="btn btn-success btn-sm" onclick="aItem('${sec}','${cat.id}')">+ Agregar</button>
      </div>
    </div>`).join('')}
    <div class="section-sep"></div>
  </div>`).join('')}

  <div style="padding:12px;background:#e8f8f0;border-radius:8px;font-size:13px;color:#1a5e32;border-left:4px solid #27ae60">
    ✅ Los <strong>Retiros de caja</strong> están marcados como INGRESO y no suman a costos.<br>
    💰 Los <strong>Dólares</strong> están marcados como AHORRO y tampoco suman a costos.<br>
    Ambos aparecen separados en reportes y dashboard.
  </div>
</div>`;
}

async function savePW(){
  const p={hugo:document.getElementById('pw-hugo').value,loli:document.getElementById('pw-loli').value,admin:document.getElementById('pw-admin').value};
  if(!p.hugo||!p.loli||!p.admin){alert('Las contraseñas no pueden estar vacías');return;}
  await fbs('controlgs/config/passwords',p);pw=p;alert('✅ Contraseñas guardadas');
}

async function aItem(sec,cid){
  const inp=document.getElementById('ni-'+cid);
  const val=inp.value.trim();if(!val)return;
  const c=JSON.parse(JSON.stringify(cats));
  const cat=(c[sec]||[]).find(x=>x.id===cid);
  if(cat&&!cat.items.includes(val)){cat.items.push(val);await fbs('controlgs/config/categories',c);}
  inp.value='';
  // El listener de Firebase va a actualizar cats y hacer rc() automáticamente
}

async function qItem(sec,cid,item){
  if(!confirm(`¿Quitar "${item}"?`))return;
  const c=JSON.parse(JSON.stringify(cats));
  const cat=(c[sec]||[]).find(x=>x.id===cid);
  if(cat){cat.items=cat.items.filter(i=>i!==item);await fbs('controlgs/config/categories',c);}
}

// ── LISTA DE REGISTROS ────────────────────────────────────────────────────
function lista(arr,canDel){
  if(!arr||!arr.length)return'<p style="color:#888;font-size:13px;text-align:center;padding:24px">Sin registros.</p>';
  const sorted=[...arr].sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const tG=sorted.filter(g=>esReal(g)&&g.moneda==='ARS').reduce((s,g)=>s+g.monto,0);
  const tI=sorted.filter(g=>(g.tipo||'gasto')==='ingreso'&&g.moneda==='ARS').reduce((s,g)=>s+g.monto,0);
  const tU=sorted.filter(g=>(g.tipo||'gasto')==='ahorro'&&g.moneda==='USD').reduce((s,g)=>s+g.monto,0);
  return`<div style="display:flex;gap:16px;margin-bottom:10px;font-size:13px;flex-wrap:wrap;padding-bottom:8px;border-bottom:1px solid #f0f4f8">
    <span><strong>${sorted.length}</strong> registros</span>
    <span style="color:#1a3a5c;font-weight:700">Gastos: $${fmt(tG)}</span>
    ${tI>0?`<span style="color:#1a7a45;font-weight:700">Retiros: $${fmt(tI)}</span>`:''}
    ${tU>0?`<span style="color:#1a5276;font-weight:700">Ahorro USD: ${fmt(tU)}</span>`:''}
  </div>
  ${sorted.map(g=>itemH(g,canDel)).join('')}`;
}

function itemH(g,canDel){
  const tipo=g.tipo||'gasto';
  const tagCls={personal:`tag-${g.usuario}`,familia:'tag-familia',empresa:'tag-empresa',dolares:'tag-dolares'}[g.seccion]||'';
  const tagLbl={personal:g.usuario==='hugo'?'Hugo':'Loli',familia:'Familia',empresa:'Empresa',dolares:'USD'}[g.seccion]||g.seccion;
  const pagoLbl={efectivo:'Efectivo',tj_debito:'Débito',tj_credito:'Crédito',transferencia:'Transf.'}[g.pago]||g.pago;
  const tipoTag=tipo==='ingreso'?'<span class="ingreso-tag">💵 INGRESO</span> ':tipo==='ahorro'?'<span class="ahorro-tag">💰 AHORRO</span> ':'';
  const cuotaTag=g.esCuotas&&!g.esPagoCuota?`<span class="cuotas-tag">${g.cuotas}c</span> `:'';
  const pcTag=g.esPagoCuota?'<span class="pago-cuota-tag">pago cuota</span> ':'';
  const mc=tipo==='ingreso'?'#1a7a45':tipo==='ahorro'?'#1a5276':'#1a3a5c';
  const pf=tipo==='ingreso'?'+ $':g.moneda==='USD'?'USD ':' $';
  const del=canDel&&g._key?`<button class="btn-danger" style="margin-top:4px" onclick="delG('${g._key}','${g.usuario}')">🗑</button>`:'';
  return`<div class="gasto-item">
    <div class="gasto-cat">${g.catIcon||'📌'}</div>
    <div class="gasto-info">
      <div class="gasto-desc">${g.catLabel} — ${g.item} ${tipoTag}${cuotaTag}${pcTag}</div>
      <div class="gasto-meta"><span class="tag ${tagCls}">${tagLbl}</span> ${g.fecha.split('-').reverse().join('/')} · ${pagoLbl}${g.desc?' · '+g.desc:''}</div>
    </div>
    <div style="text-align:right;flex-shrink:0">
      <div style="font-weight:700;font-size:15px;color:${mc}">${pf}${fmt(g.monto)}</div>${del}
    </div>
  </div>`;
}

async function delG(key,usr){
  if(!confirm('¿Eliminar este registro?'))return;
  try{await fbd(`controlgs/gastos/${key}`);await fbd(`controlgs/gastos_${usr}/${key}`);}
  catch(e){alert('Error al eliminar');}
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function esReal(g){return(g.tipo||'gasto')==='gasto'&&!g.esPagoCuota;}
function hoy(){return new Date().toISOString().substr(0,7);}
function getMonths(){return[...new Set(gastos.map(g=>g.fecha.substr(0,7)))].sort().reverse();}
function fmt(n){return Math.round(n||0).toLocaleString('es-AR');}
function fmes(m){
  if(!m)return'';
  const[y,mo]=m.split('-');
  return['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][parseInt(mo)]+' '+y;
}

// ── CHARTS ────────────────────────────────────────────────────────────────
function mkCharts(){
  setTimeout(()=>{
    const mes=tab==='reportes'?(document.getElementById('rep-mes')?.value||hoy()):hoy();
    const gm=gastos.filter(x=>x.fecha.substr(0,7)===mes&&esReal(x)&&x.moneda==='ARS');
    const sn={personal:'Personal',familia:'Familia',empresa:'Empresa'};
    const sc=['#2d6a9f','#27ae60','#e67e22','#16a085','#9b59b6'];

    if(tab==='dashboard'){
      const bs={};gm.forEach(x=>{bs[x.seccion]=(bs[x.seccion]||0)+x.monto;});
      const c1=document.getElementById('ch-sec');
      if(c1&&Object.keys(bs).length){
        if(charts['sec'])charts['sec'].destroy();
        charts['sec']=new Chart(c1,{type:'doughnut',data:{labels:Object.keys(bs).map(k=>sn[k]||k),datasets:[{data:Object.values(bs),backgroundColor:sc}]},options:{plugins:{legend:{position:'bottom'}},responsive:true,maintainAspectRatio:true}});
      }
      const bu={hugo:{},loli:{}};
      gm.forEach(x=>{if(bu[x.usuario])bu[x.usuario][x.seccion]=(bu[x.usuario][x.seccion]||0)+x.monto;});
      const ss=['personal','familia','empresa'];
      const c2=document.getElementById('ch-usr');
      if(c2){
        if(charts['usr'])charts['usr'].destroy();
        charts['usr']=new Chart(c2,{type:'bar',data:{labels:ss.map(s=>sn[s]||s),datasets:[{label:'Hugo',data:ss.map(s=>bu.hugo[s]||0),backgroundColor:'#2d6a9f',borderRadius:4},{label:'Loli',data:ss.map(s=>bu.loli[s]||0),backgroundColor:'#a0287a',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'bottom'}},scales:{y:{ticks:{callback:v=>'$'+fmt(v)}}}}});
      }
    }
    if(tab==='reportes'){
      const bs={};gm.forEach(x=>{bs[x.seccion]=(bs[x.seccion]||0)+x.monto;});
      const c1=document.getElementById('ch-rep-sec');
      if(c1&&Object.keys(bs).length){
        if(charts['rsec'])charts['rsec'].destroy();
        charts['rsec']=new Chart(c1,{type:'doughnut',data:{labels:Object.keys(bs).map(k=>sn[k]||k),datasets:[{data:Object.values(bs),backgroundColor:sc}]},options:{plugins:{legend:{position:'bottom'}},responsive:true,maintainAspectRatio:true}});
      }
      const bc={};gm.forEach(x=>{bc[x.catLabel]=(bc[x.catLabel]||0)+x.monto;});
      const top=Object.entries(bc).sort((a,b)=>b[1]-a[1]).slice(0,6);
      const c2=document.getElementById('ch-rep-cat');
      if(c2&&top.length){
        if(charts['rcat'])charts['rcat'].destroy();
        charts['rcat']=new Chart(c2,{type:'bar',data:{labels:top.map(e=>e[0]),datasets:[{data:top.map(e=>e[1]),backgroundColor:'#2d6a9f',borderRadius:4}]},options:{plugins:{legend:{display:false}},responsive:true,maintainAspectRatio:true,scales:{y:{ticks:{callback:v=>'$'+fmt(v)}}}}});
      }
    }
  },150);
}
</script>
